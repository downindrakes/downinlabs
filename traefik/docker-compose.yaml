# docker-compose.yml
services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    networks:
      - frontend

    ports:
    - "80:80"
    - "443:443"

    volumes:
      - /mnt/user0/appdata/dockhand/local/traefik/certs:/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user0/appdata/dockhand/git-repos/orthanc/downinlabs/traefik/static:/static:ro

    command:
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # acme provider
      - "--certificatesresolvers.le.acme.dnschallenge=true"
      - "--certificatesresolvers.le.acme.email=${acme_email}"
      - "--certificatesresolvers.le.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.alpn.acme.caserver=https://acme_v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.le.acme.keytype=EC384"
      - "--certificatesresolvers.le.acme.dnsChallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare-ec384.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53"
      - "--entrypoints.websecure.http.tls.certresolver=le"

      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--providers.file.directory=/static"
      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"

# Traefik Dynamic configuration via Docker labels
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - acme_email=${acme_email}
networks:
  frontend:
    name: frontend
    external: true
