# docker-compose.yml
services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    hostname: "service.downindrakes.com"
    command:
      - "--api.insecure=true"
      - "--providers.file.filename=/mnt/user0/appdata/dockhand/git-repos/orthanc/downinlabs/traefik/dynamic/tls.yaml"
      - "--global.sendAnonymousUsage=false"
      - "--log.level=DEBUG"
    labels:
      - traefik.http:routers.orthanc.tls=true
      - traefik.http:routers.orthanc.tls.certresolver=cloudflare
      - traefik.http:routers.orthanc.https.entrypoint=websecure
      - traefik.http:routers.orthanc.rule=Host('orthanc.downindrakes.com')
    ports:
      - "80:80"
      - "443:443"
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user0/appdata/dockhand/local/traefik/certs:/mnt/user0/appdata/dockhand/local/traefik/certs:rw
      - ./mnt/user0/appdata/dockhand/git-repos/orthanc/downinlabs/traefik/dynamic:/mnt/user0/appdata/dockhand/git-repos/orthanc/downinlabs/traefik/dynamic:ro
    networks:
      - "frontend"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - acme_email=${acme_email}
networks:
  frontend:
    name: frontend
    external: true
