# docker-compose.yml
services:
  traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true" # Temporary for testing, will be removed
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "443:443"
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
