entrypoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

CertificateResolvers:
  cloudflare:
    acme:
      email: $acme_email
      storage: cloudflare-acme.json
      caServer: https://acme_v02.api.letsencrypt.org/directory
      keyType: ec256
      dnsChallenge:
        - "1.1.1.1:53"
        - "8.8.8.8:53"